<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AffiHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F0A14;--bg2:#160F1E;--bg3:#1E1528;--bg4:#271C33;--border:#2E2040;--text:#F5EEF8;--muted:#7B6B8E;--yellow:#F5C842;--pink:#F0427A;--green:#2DD98F;--red:#FF5370;--blue:#5B9CF6;--grad:linear-gradient(135deg,#F5C842,#F0427A)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);background-image:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(245,200,66,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 90%,rgba(240,66,122,.09) 0%,transparent 70%)}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:400px;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.logo-wrap{display:inline-flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.logo-icon{width:40px;height:40px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(240,130,100,.3)}
.auth-tabs{display:flex;background:var(--bg3);border-radius:12px;padding:4px;margin-bottom:26px;gap:4px}
.auth-tab{flex:1;padding:9px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;font-family:inherit;transition:all .2s}
.auth-tab.active{background:var(--grad);color:#000;box-shadow:0 2px 12px rgba(240,130,100,.3)}
.fg{margin-bottom:16px}.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.fg input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:all .2s}
.fg input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(240,66,122,.1)}
.btn-primary{width:100%;padding:12px;background:var(--grad);border:none;border-radius:10px;color:#000;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;box-shadow:0 4px 20px rgba(240,130,100,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(240,130,100,.4)}
.auth-hint{margin-top:14px;text-align:center;font-size:12px;color:var(--muted)}
.auth-hint a{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;font-weight:600}
#app{display:none}.shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sb-head{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-role{padding:12px 20px 6px}
.role-badge{display:inline-flex;align-items:center;gap:5px;background:var(--grad);color:#000;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.sb-nav{flex:1;padding:8px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;margin-bottom:3px;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(240,130,100,.1);color:var(--text);border-left:3px solid var(--yellow)}
.sb-foot{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#000;flex-shrink:0}
.uname{font-size:13px;font-weight:600}.uemail{font-size:11px;color:var(--muted)}
.logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:5px;border-radius:6px;margin-left:auto;transition:all .15s}
.logout-btn:hover{color:var(--red)}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.content{padding:28px;flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}
.stat-card:hover{border-color:var(--pink);transform:translateY(-2px)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:50px;height:50px;border-radius:0 14px 0 50px;background:rgba(240,130,100,.06)}
.stat-icon{font-size:20px;margin-bottom:8px}.stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px}
.stat-val.gy{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-val.gg{color:var(--green)}.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:22px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.bal-hero{border-radius:16px;padding:26px 30px;margin-bottom:24px;background:linear-gradient(135deg,rgba(245,200,66,.1),rgba(240,66,122,.1));border:1px solid rgba(245,200,66,.2);display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.bal-hero::before{content:'$';position:absolute;right:100px;top:-10px;font-family:'Syne',sans-serif;font-size:160px;font-weight:800;color:rgba(245,200,66,.04);line-height:1;pointer-events:none}
.bal-amount{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;letter-spacing:-2px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:8px 14px;text-align:left;border-bottom:1px solid var(--border)}
tbody td{padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.bg2{background:rgba(45,217,143,.12);color:var(--green)}.by2{background:rgba(245,200,66,.15);color:var(--yellow)}
.br2{background:rgba(255,83,112,.12);color:var(--red)}.bb2{background:rgba(91,156,246,.12);color:var(--blue)}
.bp2{background:rgba(240,66,122,.15);color:var(--pink)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}
.btn-grad{background:var(--grad);color:#000;box-shadow:0 2px 12px rgba(240,130,100,.25)}
.btn-grad:hover{transform:translateY(-1px)}
.btn-grn{background:rgba(45,217,143,.12);color:var(--green);border:1px solid rgba(45,217,143,.25)}
.btn-grn:hover{background:var(--green);color:#000}
.btn-red{background:rgba(255,83,112,.12);color:var(--red);border:1px solid rgba(255,83,112,.25)}
.btn-red:hover{background:var(--red);color:#fff}
.btn-gst{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.btn-gst:hover{color:var(--text);border-color:var(--pink)}
.offer-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color .2s}
.offer-card:hover{border-color:rgba(245,200,66,.3)}
.link-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 12px;margin-top:10px}
.link-box code{flex:1;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--yellow)}
.copy-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);padding:3px 7px;border-radius:5px;transition:all .15s}
.copy-btn:hover{color:var(--yellow)}
.crypto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.crypto-opt{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;color:var(--muted)}
.crypto-opt:hover,.crypto-opt.sel{border-color:var(--yellow);color:var(--yellow);background:rgba(245,200,66,.08)}
.crypto-icon{font-size:22px;display:block;margin-bottom:4px}
.fi{margin-bottom:15px}.fi label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fi input,.fi select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:all .2s}
.fi input:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(245,200,66,.1)}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:11px;padding:4px;margin-bottom:18px}
.tab{flex:1;padding:8px;border:none;background:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;font-family:inherit;transition:all .2s;text-align:center}
.tab.active{background:var(--grad);color:#000}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dg{background:var(--green)}.dy{background:var(--yellow)}.dr{background:var(--red)}
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.act-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
#toast{position:fixed;bottom:24px;right:24px;z-index:1000;background:var(--bg4);border:1px solid var(--border);border-radius:12px;padding:13px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;transform:translateY(70px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 12px 40px rgba(0,0,0,.5)}
#toast.show{transform:translateY(0);opacity:1}
#toast.ts{border-color:rgba(45,217,143,.4);color:var(--green)}
#toast.te{border-color:rgba(255,83,112,.4);color:var(--red)}
#toast.ti{border-color:rgba(245,200,66,.3);color:var(--yellow)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:450px;max-width:95vw;transform:scale(.95);transition:transform .25s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.mo.open .modal{transform:scale(1)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
.modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:14px;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.hdiv{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:18px 0}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:30px">
      <div class="logo-wrap"><div class="logo-icon">🔗</div>AffiHub</div>
      <p style="color:var(--muted);font-size:13px;margin-top:7px">La plateforme d'affiliation privée</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Inscription</button>
    </div>
    <div id="login-form">
      <div class="fg"><label>Email</label><input type="email" id="l-email" placeholder="email@exemple.com"></div>
      <div class="fg"><label>Mot de passe</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-primary" onclick="doLogin()">Se connecter →</button>
      <p class="auth-hint">Admin : admin@affihub.com / admin123 &nbsp;·&nbsp; <a onclick="fillAdmin()">Accès rapide</a></p>
    </div>
    <div id="register-form" style="display:none">
      <div class="fg"><label>Nom complet</label><input type="text" id="r-name" placeholder="Votre nom"></div>
      <div class="fg"><label>Email</label><input type="email" id="r-email" placeholder="email@exemple.com"></div>
      <div class="fg"><label>Mot de passe</label><input type="password" id="r-pass" placeholder="Choisir un mot de passe"></div>
      <button class="btn-primary" onclick="doRegister()">Créer mon compte →</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="shell">
    <aside class="sidebar">
      <div class="sb-head">
        <div class="logo-icon" style="width:32px;height:32px;font-size:16px">🔗</div>
        <span style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800">AffiHub</span>
      </div>
      <div class="sb-role"><span class="role-badge" id="role-badge">Affilié</span></div>
      <nav class="sb-nav" id="sb-nav"></nav>
      <div class="sb-foot">
        <div class="avatar" id="u-avatar">A</div>
        <div style="min-width:0;flex:1">
          <div class="uname" id="u-name">Nom</div>
          <div class="uemail" id="u-email" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">email</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Déconnexion">⏏</button>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <div class="page-title" id="page-title">Dashboard</div>
        <div id="topbar-right"></div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div class="mo" id="mo">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="m-title">Modal</div>
      <button class="modal-close" onclick="closeMo()">✕</button>
    </div>
    <div id="m-body"></div>
  </div>
</div>

<script>
const API = '';
var TOKEN = localStorage.getItem('affihub_token');
var ME = JSON.parse(localStorage.getItem('affihub_user') || 'null');
var selCrypto = null;
var curPage = '';
var refreshTimer = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Erreur');
  return data;
}

function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t === 'login');
  document.getElementById('tab-register').classList.toggle('active', t === 'register');
  document.getElementById('login-form').style.display = t === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = t === 'register' ? 'block' : 'none';
}

function fillAdmin() {
  document.getElementById('l-email').value = 'admin@affihub.com';
  document.getElementById('l-pass').value = 'admin123';
}

async function doLogin() {
  try {
    const r = await api('POST', '/api/login', { email: document.getElementById('l-email').value.trim(), password: document.getElementById('l-pass').value.trim() });
    TOKEN = r.token; ME = r.user;
    localStorage.setItem('affihub_token', TOKEN);
    localStorage.setItem('affihub_user', JSON.stringify(ME));
    startApp();
  } catch(e) { toast(e.message, 'e'); }
}

async function doRegister() {
  try {
    const r = await api('POST', '/api/register', { name: document.getElementById('r-name').value.trim(), email: document.getElementById('r-email').value.trim(), password: document.getElementById('r-pass').value.trim() });
    TOKEN = r.token; ME = r.user;
    localStorage.setItem('affihub_token', TOKEN);
    localStorage.setItem('affihub_user', JSON.stringify(ME));
    startApp();
    toast('Bienvenue sur AffiHub !', 's');
  } catch(e) { toast(e.message, 'e'); }
}

function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('u-name').textContent = ME.name;
  document.getElementById('u-email').textContent = ME.email;
  document.getElementById('u-avatar').textContent = ME.name[0].toUpperCase();
  if (ME.role === 'admin') {
    document.getElementById('role-badge').textContent = '👑 Admin';
    buildNav([{icon:'📊',label:'Dashboard',page:'admin-dash'},{icon:'👥',label:'Affiliés',page:'admin-aff'},{icon:'🔁',label:'Conversions',page:'admin-conv'},{icon:'💸',label:'Retraits',page:'admin-wd'},{icon:'🎯',label:'Offres',page:'admin-offers'},{icon:'🔗',label:'Liens',page:'admin-links'}]);
    goPage('admin-dash');
  } else {
    document.getElementById('role-badge').textContent = '⚡ Affilié';
    buildNav([{icon:'🏠',label:'Dashboard',page:'aff-dash'},{icon:'🔗',label:'Mes liens',page:'aff-links'},{icon:'📈',label:'Statistiques',page:'aff-stats'},{icon:'🔁',label:'Conversions',page:'aff-conv'},{icon:'💸',label:'Paiements',page:'aff-pay'}]);
    goPage('aff-dash');
  }
  // Auto-refresh toutes les 30 secondes
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => { if (curPage) goPage(curPage); }, 30000);
}

function logout() {
  TOKEN = null; ME = null;
  localStorage.removeItem('affihub_token');
  localStorage.removeItem('affihub_user');
  clearInterval(refreshTimer);
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

function buildNav(items) {
  var nav = document.getElementById('sb-nav'); nav.innerHTML = '';
  items.forEach(item => {
    var el = document.createElement('div');
    el.className = 'nav-item'; el.id = 'nav-' + item.page;
    el.innerHTML = '<span style="font-size:16px;width:22px;text-align:center">' + item.icon + '</span>' + item.label;
    el.onclick = () => goPage(item.page);
    nav.appendChild(el);
  });
}

const TITLES = {'aff-dash':'Dashboard','aff-links':'Mes liens','aff-stats':'Statistiques','aff-conv':'Conversions','aff-pay':'Paiements','admin-dash':'Dashboard','admin-aff':'Affiliés','admin-conv':'Conversions','admin-wd':'Retraits','admin-offers':'Offres','admin-links':'Liens & Anti-fraude'};

async function goPage(page) {
  curPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + page); if (nav) nav.classList.add('active');
  document.getElementById('page-title').textContent = TITLES[page] || page;
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div> Chargement...</div>';
  try {
    const html = await renderPage(page);
    document.getElementById('content').innerHTML = html;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>' + e.message + '</p></div>';
  }
}

function sbadge(s) {
  const m = {approved:'<span class="badge bg2"><span class="dot dg"></span>Approuvée</span>',pending:'<span class="badge by2"><span class="dot dy"></span>En attente</span>',rejected:'<span class="badge br2"><span class="dot dr"></span>Rejetée</span>',paid:'<span class="badge bg2"><span class="dot dg"></span>Payé</span>',active:'<span class="badge bg2">Actif</span>',disabled:'<span class="badge br2">Désactivé</span>'};
  return m[s] || s;
}

function gtext(val) { return '<span style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">' + val + '</span>'; }

async function renderPage(page) {
  // Refresh user data
  try { ME = await api('GET', '/api/me'); localStorage.setItem('affihub_user', JSON.stringify(ME)); } catch(e) {}

  if (page === 'aff-dash') {
    const [convs, links] = await Promise.all([api('GET','/api/conversions'), api('GET','/api/links')]);
    const approved = convs.filter(c => c.status === 'approved');
    const pending = convs.filter(c => c.status === 'pending');
    const totalGains = approved.reduce((s,c) => s + c.amount, 0);
    const totalClicks = links.reduce((s,l) => s + l.clicks, 0);
    const recentRows = convs.slice(0,5).map(c => `<tr><td style="color:var(--muted)">${c.created_at?.split('T')[0]||'—'}</td><td>${c.offers?.name||'?'}</td><td style="color:var(--yellow);font-weight:700">$${c.amount}</td><td>${sbadge(c.status)}</td></tr>`).join('');
    return `<div class="bal-hero"><div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Solde disponible</div><div class="bal-amount">$${ME.balance||0}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Retrait minimum : $30</div></div><button class="btn btn-grad" onclick="goPage('aff-pay')" style="font-size:13px;padding:11px 22px">💸 Retirer</button></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">🖱️</div><div class="stat-label">Clics total</div><div class="stat-val gy">${totalClicks}</div><div class="stat-sub">sur ${links.length} lien(s)</div></div>
      <div class="stat-card"><div class="stat-icon">🔁</div><div class="stat-label">Conversions</div><div class="stat-val gy">${convs.length}</div><div class="stat-sub">${approved.length} approuvées · ${pending.length} en attente</div></div>
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Gains totaux</div><div class="stat-val gg">$${totalGains}</div><div class="stat-sub">depuis le début</div></div>
    </div>
    <div class="card"><div class="card-header"><div class="card-title">Dernières conversions</div><button class="btn btn-gst btn-sm" onclick="goPage('aff-conv')">Voir tout →</button></div>
    ${convs.length===0?'<div class="empty"><div class="empty-icon">🔁</div><p>Aucune conversion pour l\'instant</p></div>':'<div class="tw"><table><thead><tr><th>Date</th><th>Offre</th><th>Montant</th><th>Statut</th></tr></thead><tbody>'+recentRows+'</tbody></table></div>'}</div>`;
  }

  if (page === 'aff-links') {
    const [offers, links] = await Promise.all([api('GET','/api/offers'), api('GET','/api/links')]);
    const active = offers.filter(o => o.active);
    if (active.length === 0) return '<div class="card"><div class="empty"><div class="empty-icon">🎯</div><p>Aucune offre disponible pour l\'instant.</p></div></div>';
    const cards = active.map(o => {
      const el = links.find(l => l.offer_id === o.id);
      const origin = window.location.origin;
      return `<div class="offer-card"><div style="flex:1"><div style="font-size:14px;font-weight:700;margin-bottom:4px">${o.name}</div><div style="font-size:12px;color:var(--muted)">${o.description||''}</div>
      ${el?`<div class="link-box"><code>${origin}/go/${el.id}</code><button class="copy-btn" onclick="cpLink('${el.id}',this)">📋</button></div>`:''}
      </div><div style="text-align:right;flex-shrink:0">${gtext('$'+o.commission)}<div style="font-size:11px;color:var(--muted);margin-bottom:10px">par conversion</div>
      ${el?'<span class="badge bg2">✓ Lien actif</span>':`<button class="btn btn-grad btn-sm" onclick="genLink(${o.id})">Générer lien</button>`}</div></div>`;
    }).join('');
    return `<div class="card"><div class="card-header"><div class="card-title">Offres disponibles</div><span class="badge bp2">${active.length} offre(s)</span></div>${cards}</div>`;
  }

  if (page === 'aff-stats') {
    const [links, convs] = await Promise.all([api('GET','/api/links'), api('GET','/api/conversions')]);
    if (links.length === 0) return '<div class="card"><div class="empty"><div class="empty-icon">📈</div><p>Aucun lien généré.</p></div></div>';
    const origin = window.location.origin;
    const rows = links.map(l => {
      const lc = convs.filter(c => c.link_id === l.id && c.status === 'approved');
      const gains = lc.reduce((s,c)=>s+c.amount,0);
      const rate = l.clicks>0?((lc.length/l.clicks)*100).toFixed(1):'0.0';
      return `<tr><td><code style="font-family:monospace;font-size:12px;color:var(--yellow)">${origin}/go/${l.id}</code></td><td>${l.offers?.name||'?'}</td><td style="font-weight:600">${l.clicks}</td><td>${lc.length}</td><td style="color:var(--green);font-weight:700">$${gains}</td><td><span class="badge bb2">${rate}%</span></td></tr>`;
    }).join('');
    return `<div class="card"><div class="card-title" style="margin-bottom:16px">Performance par lien</div><div class="tw"><table><thead><tr><th>Lien</th><th>Offre</th><th>Clics</th><th>Conversions</th><th>Gains</th><th>Taux</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }

  if (page === 'aff-conv') {
    const convs = await api('GET', '/api/conversions');
    const tabs = [['all','Toutes',convs.length],['approved','✅ Approuvées',convs.filter(c=>c.status==='approved').length],['pending','⏳ En attente',convs.filter(c=>c.status==='pending').length],['rejected','❌ Rejetées',convs.filter(c=>c.status==='rejected').length]];
    const tabHtml = tabs.map(([f,l,n]) => `<button class="tab${f==='all'?' active':''}" onclick="filterAffConv(this,'${f}')">${l} (${n})</button>`).join('');
    const rows = convs.map(c=>`<tr><td style="color:var(--muted)">${c.created_at?.split('T')[0]||'—'}</td><td>${c.offers?.name||'?'}</td><td><code style="font-size:11px;color:var(--muted)">${c.link_id}</code></td><td style="color:var(--yellow);font-weight:600">$${c.amount}</td><td>${sbadge(c.status)}</td></tr>`).join('');
    return `<div class="card"><div class="card-title" style="margin-bottom:16px">Mes conversions</div><div class="tabs" id="conv-tabs">${tabHtml}</div><div id="conv-rows"><div class="tw"><table><thead><tr><th>Date</th><th>Offre</th><th>Lien</th><th>Montant</th><th>Statut</th></tr></thead><tbody id="conv-tbody">${rows||'<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px">Aucune conversion</td></tr>'}</tbody></table></div></div></div>`;
  }

  if (page === 'aff-pay') {
    const wds = await api('GET', '/api/withdrawals');
    const bal = ME.balance || 0;
    const canWd = bal >= 30;
    const wrows = wds.map(w=>`<tr><td style="color:var(--muted)">${w.created_at?.split('T')[0]||'—'}</td><td style="color:var(--yellow);font-weight:800">$${w.amount}</td><td><span class="badge bp2">${w.crypto}</span></td><td><code style="font-size:11px;color:var(--muted)">${w.address.substring(0,22)}...</code></td><td>${sbadge(w.status)}${w.status==='rejected'&&w.reason?`<div style="font-size:11px;color:var(--red);margin-top:3px">↳ ${w.reason}</div>`:''}</td></tr>`).join('');
    return `<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Solde disponible</div><div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">$${bal}</div></div>${canWd?'<span class="badge bg2" style="font-size:12px;padding:5px 12px">✓ Retrait disponible</span>':'<span class="badge by2" style="font-size:12px;padding:5px 12px">⚠ Minimum $30</span>'}</div>
    <div class="hdiv"></div>
    <div class="fi"><label>Montant ($)</label><input type="number" id="wd-amt" min="30" max="${bal}" placeholder="Minimum $30" ${canWd?'':'disabled'}></div>
    <div class="fi"><label>Crypto</label><div class="crypto-grid">
      <div class="crypto-opt" onclick="pickCrypto('BTC',this)"><span class="crypto-icon">₿</span>Bitcoin</div>
      <div class="crypto-opt" onclick="pickCrypto('SOL',this)"><span class="crypto-icon">◎</span>Solana</div>
      <div class="crypto-opt" onclick="pickCrypto('LTC',this)"><span class="crypto-icon">Ł</span>Litecoin</div>
    </div></div>
    <div class="fi"><label>Adresse crypto</label><input type="text" id="wd-addr" placeholder="Votre adresse" ${canWd?'':'disabled'}></div>
    <button class="btn btn-grad" onclick="doWd()" style="width:100%;justify-content:center" ${canWd?'':'disabled'}>💸 Soumettre la demande</button></div>
    <div class="card"><div class="card-title" style="margin-bottom:16px">Historique des retraits</div>${wds.length===0?'<div class="empty"><div class="empty-icon">💳</div><p>Aucun retrait</p></div>':'<div class="tw"><table><thead><tr><th>Date</th><th>Montant</th><th>Crypto</th><th>Adresse</th><th>Statut</th></tr></thead><tbody>'+wrows+'</tbody></table></div>'}</div>`;
  }

  if (page === 'admin-dash') {
    const stats = await api('GET', '/api/stats');
    const [convs, wds] = await Promise.all([api('GET','/api/conversions'), api('GET','/api/withdrawals')]);
    const pending = convs.filter(c => c.status === 'pending');
    const pendWd = wds.filter(w => w.status === 'pending');
    const prows = pending.slice(0,4).map(c=>`<div class="act-item"><div class="act-icon" style="background:rgba(245,200,66,.1)">🔁</div><div style="flex:1;font-size:13px"><b>${c.users?.name||'?'}</b> — ${c.offers?.name||'?'}<div style="font-size:11px;color:var(--yellow)">$${c.amount}</div></div><div style="display:flex;gap:4px"><button class="btn btn-grn btn-sm" onclick="apprC(${c.id})">✔</button><button class="btn btn-red btn-sm" onclick="rejtC(${c.id})">✕</button></div></div>`).join('');
    const wrows = pendWd.slice(0,4).map(w=>`<div class="act-item"><div class="act-icon" style="background:rgba(240,66,122,.1)">💳</div><div style="flex:1;font-size:13px"><b>${w.users?.name||'?'}</b><div style="font-size:11px;color:var(--muted)">${w.crypto} — ${w.address.substring(0,16)}...</div></div><div style="font-weight:900;color:var(--yellow)">$${w.amount}</div></div>`).join('');
    return `<div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">Affiliés</div><div class="stat-val gy">${stats.affiliates}</div></div>
      <div class="stat-card"><div class="stat-icon">🖱️</div><div class="stat-label">Clics totaux</div><div class="stat-val gy">${stats.totalClicks}</div></div>
      <div class="stat-card"><div class="stat-icon">🔁</div><div class="stat-label">Conversions</div><div class="stat-val gy">${stats.totalConversions}</div><div class="stat-sub">${stats.pendingConversions} en attente</div></div>
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Gains distribués</div><div class="stat-val gg">$${stats.totalGains}</div></div>
      <div class="stat-card"><div class="stat-icon">💸</div><div class="stat-label">Retraits pending</div><div class="stat-val ${stats.pendingWithdrawals>0?'gy':''}">${stats.pendingWithdrawals}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
      <div class="card" style="margin-bottom:0"><div class="card-header"><div class="card-title">⏳ À valider</div><button class="btn btn-gst btn-sm" onclick="goPage('admin-conv')">Voir tout →</button></div>${pending.length===0?'<div class="empty" style="padding:20px"><div class="empty-icon" style="font-size:24px">✅</div><p>Tout est à jour !</p></div>':prows}</div>
      <div class="card" style="margin-bottom:0"><div class="card-header"><div class="card-title">💸 Retraits</div><button class="btn btn-gst btn-sm" onclick="goPage('admin-wd')">Voir tout →</button></div>${pendWd.length===0?'<div class="empty" style="padding:20px"><div class="empty-icon" style="font-size:24px">✅</div><p>Aucun retrait en attente</p></div>':wrows}</div>
    </div>`;
  }

  if (page === 'admin-aff') {
    const users = await api('GET', '/api/users');
    if (users.length === 0) return '<div class="card"><div class="empty"><div class="empty-icon">👥</div><p>Aucun affilié inscrit</p></div></div>';
    const rows = users.map(u => {
      return `<tr><td><div style="display:flex;align-items:center;gap:9px"><div class="avatar" style="width:30px;height:30px;font-size:12px">${u.name[0]}</div><b>${u.name}</b></div></td><td style="color:var(--muted)">${u.email}</td><td>${gtext('$'+(u.balance||0))}</td><td>${u.created_at?.split('T')[0]||'—'}</td><td><button class="btn btn-red btn-sm" onclick="confirmDeleteAff('${u.id}','${u.name}','${u.email}')">🗑 Supprimer</button></td></tr>`;
    }).join('');
    return `<div class="card"><div class="card-header"><div class="card-title">Liste des affiliés</div><span class="badge bp2">${users.length} affilié(s)</span></div><div class="tw"><table><thead><tr><th>Affilié</th><th>Email</th><th>Solde</th><th>Inscrit le</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }

  if (page === 'admin-conv') {
    const convs = await api('GET', '/api/conversions');
    const pending = convs.filter(c=>c.status==='pending');
    const rows = convs.map(c=>`<tr><td style="color:var(--muted)">${c.created_at?.split('T')[0]||'—'}</td><td>${c.users?.name||'?'}</td><td>${c.offers?.name||'?'}</td><td style="font-weight:900;color:var(--yellow)">$${c.amount}</td><td>${sbadge(c.status)}</td><td>${c.status==='pending'?`<div style="display:flex;gap:4px"><button class="btn btn-grn btn-sm" onclick="apprC(${c.id})">✔ Approuver</button><button class="btn btn-red btn-sm" onclick="rejtC(${c.id})">✕ Rejeter</button></div>`:'<span style="color:var(--muted)">—</span>'}</td></tr>`).join('');
    return `<div class="card"><div class="card-header"><div class="card-title">Toutes les conversions</div>${pending.length>0?'<span class="badge by2">⏳ '+pending.length+' à valider</span>':'<span class="badge bg2">✓ Tout validé</span>'}</div>${rows?'<div class="tw"><table><thead><tr><th>Date</th><th>Affilié</th><th>Offre</th><th>Montant</th><th>Statut</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table></div>':'<div class="empty"><div class="empty-icon">🔁</div><p>Aucune conversion</p></div>'}</div>`;
  }

  if (page === 'admin-wd') {
    const wds = await api('GET', '/api/withdrawals');
    const rows = wds.map(w=>`<tr><td style="color:var(--muted)">${w.created_at?.split('T')[0]||'—'}</td><td>${w.users?.name||'?'}</td><td style="font-weight:900;color:var(--yellow)">$${w.amount}</td><td><span class="badge bp2">${w.crypto}</span></td><td><code style="font-size:11px;color:var(--muted)">${w.address.substring(0,20)}</code></td><td>${sbadge(w.status)}${w.status==='rejected'&&w.reason?`<div style="font-size:11px;color:var(--red)">↳ ${w.reason}</div>`:''}</td><td>${w.status==='pending'?`<div style="display:flex;gap:4px"><button class="btn btn-grn btn-sm" onclick="apprW(${w.id})">✔ Payé</button><button class="btn btn-red btn-sm" onclick="openRejtW(${w.id})">✕ Rejeter</button></div>`:'<span style="color:var(--muted)">—</span>'}</td></tr>`).join('');
    return `<div class="card"><div class="card-title" style="margin-bottom:16px">Demandes de retraits</div>${rows?'<div class="tw"><table><thead><tr><th>Date</th><th>Affilié</th><th>Montant</th><th>Crypto</th><th>Adresse</th><th>Statut</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table></div>':'<div class="empty"><div class="empty-icon">💸</div><p>Aucune demande</p></div>'}</div>`;
  }

  if (page === 'admin-offers') {
    const offers = await api('GET', '/api/offers');
    const cards = offers.map(o=>`<div class="offer-card"><div style="flex:1"><div style="font-size:14px;font-weight:700;margin-bottom:4px">${o.name}</div><div style="font-size:12px;color:var(--muted)">${o.description||''}</div><div style="font-size:11px;color:var(--muted);margin-top:5px">🔗 ${o.url}</div></div><div style="text-align:right">${gtext('$'+o.commission)}<div style="margin-top:8px">${sbadge(o.active?'active':'disabled')}</div></div></div>`).join('');
    return `<div class="card"><div class="card-header"><div class="card-title">Offres</div><button class="btn btn-grad btn-sm" onclick="openAddOffer()">+ Ajouter offre</button></div>${offers.length===0?'<div class="empty"><div class="empty-icon">🎯</div><p>Aucune offre. Ajoutez votre première offre.</p></div>':cards}</div>`;
  }

  if (page === 'admin-links') {
    const links = await api('GET', '/api/links');
    const origin = window.location.origin;
    const rows = links.map(l=>`<tr><td><code style="font-family:monospace;font-size:12px;color:var(--yellow)">${origin}/go/${l.id}</code></td><td>${l.user_id?.substring(0,8)||'?'}...</td><td>${l.offers?.name||'?'}</td><td style="font-weight:600">${l.clicks}</td><td>${sbadge(l.active?'active':'disabled')}</td><td>${l.active?`<button class="btn btn-red btn-sm" onclick="toggleLnk('${l.id}',false)">🚫 Désactiver</button>`:`<button class="btn btn-grn btn-sm" onclick="toggleLnk('${l.id}',true)">✅ Réactiver</button>`}</td></tr>`).join('');
    return `<div class="card"><div class="card-header"><div class="card-title">Liens & Anti-fraude</div></div>${rows?'<div class="tw"><table><thead><tr><th>Lien</th><th>Affilié</th><th>Offre</th><th>Clics</th><th>Statut</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table></div>':'<div class="empty"><div class="empty-icon">🔗</div><p>Aucun lien généré</p></div>'}</div>`;
  }
  return '';
}

// Actions
async function genLink(offerId) {
  try { await api('POST','/api/links',{offer_id:offerId}); toast('Lien généré !','s'); goPage('aff-links'); }
  catch(e) { toast(e.message,'e'); }
}

function cpLink(id, btn) {
  navigator.clipboard?.writeText(window.location.origin+'/go/'+id);
  btn.textContent='✅'; toast('Lien copié !','s');
  setTimeout(()=>btn.textContent='📋',2000);
}

function pickCrypto(c,el) {
  selCrypto=c;
  document.querySelectorAll('.crypto-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

async function doWd() {
  const amt=parseFloat(document.getElementById('wd-amt').value);
  const addr=document.getElementById('wd-addr').value.trim();
  if(!amt||amt<30){toast('Minimum $30','e');return;}
  if(!selCrypto){toast('Choisissez une crypto','e');return;}
  if(!addr){toast('Entrez votre adresse','e');return;}
  try { await api('POST','/api/withdrawals',{amount:amt,crypto:selCrypto,address:addr}); toast('Demande envoyée !','s'); selCrypto=null; goPage('aff-pay'); }
  catch(e){toast(e.message,'e');}
}

async function apprC(id) {
  try { await api('PATCH',`/api/conversions/${id}/approve`); toast('Conversion approuvée ✓','s'); goPage(curPage); }
  catch(e){toast(e.message,'e');}
}

async function rejtC(id) {
  try { await api('PATCH',`/api/conversions/${id}/reject`); toast('Conversion rejetée','e'); goPage(curPage); }
  catch(e){toast(e.message,'e');}
}

async function apprW(id) {
  try { await api('PATCH',`/api/withdrawals/${id}/approve`); toast('Retrait marqué payé ✓','s'); goPage(curPage); }
  catch(e){toast(e.message,'e');}
}

function openRejtW(id) {
  document.getElementById('m-title').textContent='Rejeter le retrait';
  document.getElementById('m-body').innerHTML='<div class="fi"><label>Raison du rejet</label><input type="text" id="rjt-reason" placeholder="ex: adresse invalide..."></div><div style="display:flex;gap:10px;margin-top:6px"><button class="btn btn-gst" onclick="closeMo()" style="flex:1">Annuler</button><button class="btn btn-red" onclick="doRejtW('+id+')" style="flex:1">Confirmer</button></div>';
  document.getElementById('mo').classList.add('open');
}

async function doRejtW(id) {
  const reason=document.getElementById('rjt-reason').value.trim();
  if(!reason){toast('Indiquez une raison','e');return;}
  try { await api('PATCH',`/api/withdrawals/${id}/reject`,{reason}); closeMo(); toast('Retrait rejeté','e'); goPage(curPage); }
  catch(e){toast(e.message,'e');}
}

async function toggleLnk(id,active) {
  try { await api('PATCH',`/api/links/${id}`,{active}); toast(active?'Lien réactivé':'Lien désactivé',active?'s':'e'); goPage(curPage); }
  catch(e){toast(e.message,'e');}
}

function confirmDeleteAff(id,name,email) {
  document.getElementById('m-title').textContent='Supprimer le compte';
  document.getElementById('m-body').innerHTML=`<div style="text-align:center;padding:8px 0 20px"><div style="font-size:44px;margin-bottom:12px">⚠️</div><div style="font-size:13px;color:var(--muted);margin-bottom:4px">Vous allez supprimer</div><div style="font-weight:900;font-size:18px;margin-bottom:2px">${name}</div><div style="font-size:13px;color:var(--muted);margin-bottom:18px">${email}</div><div style="font-size:12px;color:var(--red);background:rgba(255,83,112,.1);border:1px solid rgba(255,83,112,.2);border-radius:10px;padding:12px;margin-bottom:22px;text-align:left">⚠️ Action irréversible. Tous ses liens, conversions et retraits seront supprimés.</div><div style="display:flex;gap:10px"><button class="btn btn-gst" onclick="closeMo()" style="flex:1">Annuler</button><button class="btn btn-red" onclick="deleteAff('${id}')" style="flex:1">Confirmer</button></div></div>`;
  document.getElementById('mo').classList.add('open');
}

async function deleteAff(id) {
  try { await api('DELETE',`/api/users/${id}`); closeMo(); toast('Compte supprimé','s'); goPage('admin-aff'); }
  catch(e){toast(e.message,'e');}
}

function openAddOffer() {
  document.getElementById('m-title').textContent='Nouvelle offre';
  document.getElementById('m-body').innerHTML='<div class="fi"><label>Nom</label><input type="text" id="on" placeholder="Ex: VPN Premium"></div><div class="fi"><label>Description</label><input type="text" id="od" placeholder="Ex: Service VPN haut débit 🌍"></div><div class="fi"><label>URL partenaire</label><input type="text" id="ou" placeholder="https://..."></div><div class="fi"><label>Commission ($)</label><input type="number" id="oc" value="10"></div><button class="btn btn-grad" onclick="doAddOffer()" style="width:100%;justify-content:center;margin-top:6px">Créer l\'offre →</button>';
  document.getElementById('mo').classList.add('open');
}

async function doAddOffer() {
  const name=document.getElementById('on').value.trim();
  const url=document.getElementById('ou').value.trim();
  if(!name||!url){toast('Nom et URL requis','e');return;}
  try { await api('POST','/api/offers',{name,description:document.getElementById('od').value.trim(),url,commission:parseFloat(document.getElementById('oc').value)||10}); closeMo(); toast('Offre créée !','s'); goPage('admin-offers'); }
  catch(e){toast(e.message,'e');}
}

function filterAffConv(btn,f) {
  document.querySelectorAll('#conv-tabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function closeMo(){document.getElementById('mo').classList.remove('open');}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeMo();});

var toastTimer;
function toast(msg,type) {
  const el=document.getElementById('toast');
  const ic={s:'✅',e:'❌',i:'💡'};
  el.innerHTML=(ic[type]||'💡')+' '+msg;
  el.className='show t'+(type||'i');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='',3200);
}

// Auto-login si token présent
if (TOKEN && ME) startApp();
</script>
